{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kloud-csi.nodeServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kloud-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kloud-csi.fullname" . }}-node
  labels:
    {{- include "kloud-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kloud-csi.fullname" . }}-node
  labels:
    {{- include "kloud-csi.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kloud-csi.fullname" . }}-node
subjects:
  - kind: ServiceAccount
    name: {{ include "kloud-csi.nodeServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
