{{- include "kloud-csi.validateRequired" . }}
{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kloud-csi.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kloud-csi.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-token: {{ required "accessToken is required when existingSecret is not set" .Values.accessToken | quote }}
{{- end }}
